<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinSight AI — Financial Document Analyst</title>
    <meta name="description" content="AI-powered SEC filing analysis: extract metrics, assess management tone, classify risks, and benchmark competitors from 10-K/10-Q filings." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=3" />
    <link rel="stylesheet" href="/static/styles.css?v=3" />
  </head>
  <body>
    <!-- Hidden form to maintain existing file upload handler -->
    <form id="uploadForm" class="upload-section" style="display: none;">
      <input id="documents" name="documents" type="file" multiple accept=".pdf,.txt,.md,.html,.htm,.csv" />
    </form>

    <div class="app-shell" id="appShell">
      
      <!-- Zone 1: Topbar (48px fixed height) -->
      <header class="topbar">
        <div class="topbar-left">
          <svg class="logo-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c6aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
            <path d="M2 17l10 5 10-5"></path>
            <path d="M2 12l10 5 10-5"></path>
          </svg>
          <span class="logo-text">FinSight AI</span>
          <span class="chevron">›</span>
          <span class="active-file" id="activeFile">No filing selected</span>
        </div>
        
        <div class="topbar-right">
          <div class="status-chip" id="statusBox">
            <div class="status-dot" id="statusDot"></div>
            <span id="status">Ready</span>
          </div>
          
          <button type="button" class="btn btn-ghost" id="addFilingBtn">
            ＋ Add filing
          </button>
          
          <button type="button" class="btn btn-primary" id="analyzeBtn">
            Analyze
          </button>
        </div>
      </header>
      
      <!-- Zone 2: Tab Strip (36px fixed height) -->
      <nav class="tab-strip nav-tabs" aria-label="Result sections">
        <button class="nav-tab active" data-tab="summary" id="tab-summary">Summary</button>
        <button class="nav-tab" data-tab="metrics" id="tab-metrics">Metrics</button>
        <button class="nav-tab" data-tab="tone" id="tab-tone">Tone</button>
        <button class="nav-tab" data-tab="risks" id="tab-risks">Risks</button>
        <button class="nav-tab" data-tab="benchmark" id="tab-benchmark">Benchmark</button>
        <button class="nav-tab" data-tab="memo" id="tab-memo">Memo</button>
      </nav>

      <!-- Loading animation -->
      <div class="loading-bar" id="loadingBar"></div>

      <!-- Zone 3: Content Area -->
      <main class="content-area main-content" id="mainContent">
        <!-- Global Empty State -->
        <div class="empty-placeholder" id="globalEmptyState">
          <div class="empty-card">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <div class="empty-heading">Upload a filing to begin</div>
            <div class="empty-subtext">Drop a 10-K, 10-Q, or earnings transcript to extract financial metrics, assess tone, and generate an investment memo.</div>
            <div class="feature-hints">
              <div class="hint-row"><div class="hint-dot teal"></div>Extract financial metrics from filings</div>
              <div class="hint-row"><div class="hint-dot amber"></div>Assess management tone and sentiment</div>
              <div class="hint-row"><div class="hint-dot red"></div>Identify risks and generate memos</div>
            </div>
          </div>
        </div>

        <div id="summary" class="view active"></div>
        <div id="metrics" class="view"></div>
        <div id="tone" class="view"></div>
        <div id="risks" class="view"></div>
        <div id="benchmark" class="view"></div>
        <div id="memo" class="view"></div>

      </main>
    </div>
    <script src="/static/app.js?v=3"></script>
  </body>
</html>
